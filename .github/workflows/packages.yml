name: Native packages

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  source:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read release metadata
        id: release
        run: |
          version=$(sed -n 's/^VERSION=//p' packaging/release.env)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || \
             [[ $(grep -c '^VERSION=' packaging/release.env) -ne 1 ]]; then
            echo "packaging/release.env must contain exactly one semantic VERSION" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build deterministic source archive
        run: scripts/build-source-tarball.sh
      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: dist/warp-control-${{ steps.release.outputs.version }}.tar.gz
          if-no-files-found: error

  appimage:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
          - arch: aarch64
            runner: ubuntu-22.04-arm
    env:
      TOOL_DIR: ${{ github.workspace }}/.appimage-tools
    steps:
      - uses: actions/checkout@v4
      - name: Install native AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-venv python3-pip python3-gi \
            gir1.2-gtk-3.0 gir1.2-ayatanaappindicator3-0.1 \
            libgirepository1.0-dev libgtk-3-0 libayatana-appindicator3-1 \
            patchelf xvfb
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install --disable-pip-version-check 'pyinstaller==6.21.0'
      - name: Download official AppImage build inputs
        run: |
          mkdir -m 0700 "$TOOL_DIR"
          curl --fail --location --retry 3 \
            --output "$TOOL_DIR/appimagetool-${{ matrix.arch }}.AppImage" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          curl --fail --location --retry 3 \
            --output "$TOOL_DIR/runtime-${{ matrix.arch }}" \
            "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-${{ matrix.arch }}"
      - name: Verify pinned inputs before execution
        run: |
          cd "$TOOL_DIR"
          grep "  appimagetool-${{ matrix.arch }}.AppImage$" \
            "$GITHUB_WORKSPACE/packaging/appimage/appimagetool.sha256" | sha256sum --check -
          grep "  runtime-${{ matrix.arch }}$" \
            "$GITHUB_WORKSPACE/packaging/appimage/runtime.sha256" | sha256sum --check -
          chmod 0700 "appimagetool-${{ matrix.arch }}.AppImage"
      - name: Build architecture-native AppImage
        run: |
          scripts/build-appimage.sh \
            --arch "${{ matrix.arch }}" \
            --appimagetool "$TOOL_DIR/appimagetool-${{ matrix.arch }}.AppImage" \
            --runtime-file "$TOOL_DIR/runtime-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/dist"
      - name: Inspect and smoke-test final AppImage
        run: |
          images=(dist/WARP-Control-*-"${{ matrix.arch }}".AppImage)
          [[ ${#images[@]} -eq 1 && -f ${images[0]} ]]
          image=${images[0]}
          extract_root=$(mktemp -d "$RUNNER_TEMP/warp-control-inspect.XXXXXX")
          trap 'rm -rf -- "$extract_root"' EXIT
          cd "$extract_root"
          "$GITHUB_WORKSPACE/$image" --appimage-extract >/dev/null
          [[ ! -e squashfs-root/usr/libexec/warp-control ]]
          [[ ! -e squashfs-root/usr/share/polkit-1 ]]
          for forbidden in warp-cli warp-svc dnf apt-get pacman; do
            if find squashfs-root -name "$forbidden" -print -quit | grep -q .; then
              echo "Forbidden AppImage content: $forbidden" >&2
              exit 1
            fi
          done
          cd "$GITHUB_WORKSPACE"
          xvfb-run -a "$image" --appimage-extract-and-run --smoke-test
      - uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.arch }}
          path: dist/WARP-Control-*-${{ matrix.arch }}.AppImage
          if-no-files-found: error

  rpm:
    needs: source
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora43
            container: fedora:43
            family: fedora
            major: 43
            dist_tag: fc43
          - target: fedora44
            container: fedora:44
            family: fedora
            major: 44
            dist_tag: fc44
          - target: el9
            container: rockylinux/rockylinux:9
            family: el
            major: 9
            dist_tag: el9
          - target: el10
            container: rockylinux/rockylinux:10
            family: el
            major: 10
            dist_tag: el10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: dist
      - name: Enable CRB
        if: matrix.family == 'el'
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled crb
      - name: Enable EPEL
        if: matrix.family == 'el'
        run: |
          dnf -y install \
            "https://dl.fedoraproject.org/pub/epel/epel-release-latest-${{ matrix.major }}.noarch.rpm"
      - name: Install RPM build requirements
        run: |
          dnf -y install rpm-build python3-devel pyproject-rpm-macros python3-pytest \
            python3-setuptools python3-pip python3-packaging python3-gobject gtk3 \
            python3-idna python3-pyyaml desktop-file-utils appstream
      - name: Build target-native RPM
        run: |
          rpmbuild -ba packaging/rpm/warp-control.spec \
            --define "dist .${{ matrix.dist_tag }}" \
            --define "_sourcedir $GITHUB_WORKSPACE/dist" \
            --define "_topdir $GITHUB_WORKSPACE/packaging/rpm"
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.target }}
          path: packaging/rpm/RPMS/noarch/warp-control-*.${{ matrix.dist_tag }}.noarch.rpm
          if-no-files-found: error

  rpm-install:
    needs: rpm
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fedora43
            container: fedora:43
            family: fedora
            major: 43
            dist_tag: fc43
          - target: fedora44
            container: fedora:44
            family: fedora
            major: 44
            dist_tag: fc44
          - target: el9
            container: rockylinux/rockylinux:9
            family: el
            major: 9
            dist_tag: el9
          - target: el10
            container: rockylinux/rockylinux:10
            family: el
            major: 10
            dist_tag: el10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rpm-${{ matrix.target }}
          path: package
      - name: Enable CRB
        if: matrix.family == 'el'
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled crb
      - name: Enable EPEL
        if: matrix.family == 'el'
        run: |
          dnf -y install \
            "https://dl.fedoraproject.org/pub/epel/epel-release-latest-${{ matrix.major }}.noarch.rpm"
      - name: Install and smoke-test RPM
        run: |
          dnf -y install package/warp-control-*.${{ matrix.dist_tag }}.noarch.rpm
          /usr/bin/warp-control --smoke-test

  deb:
    needs: source
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu2204
            container: ubuntu:22.04
          - target: ubuntu2404
            container: ubuntu:24.04
          - target: ubuntu2604
            container: ubuntu:26.04
          - target: debian12
            container: debian:12
          - target: debian13
            container: debian:13
    env:
      DEBIAN_FRONTEND: noninteractive
      VERSION: ${{ needs.source.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: dist
      - name: Install Debian build requirements
        run: |
          apt-get update
          apt-get install -y build-essential debhelper dh-python \
            pybuild-plugin-pyproject python3-all python3-setuptools python3-wheel \
            python3-pytest python3-yaml python3-idna python3-gi gir1.2-gtk-3.0 \
            desktop-file-utils appstream lintian
      - name: Stage shared source archive
        run: |
          mkdir build
          cp "dist/warp-control-$VERSION.tar.gz" "build/warp-control_$VERSION.orig.tar.gz"
          tar --extract --gzip --file="dist/warp-control-$VERSION.tar.gz" --directory=build
      - name: Build and lint DEB
        working-directory: build/warp-control-${{ needs.source.outputs.version }}
        run: |
          dpkg-buildpackage -us -uc -b
          lintian --profile debian --fail-on error ../warp-control_*.changes
      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: build/warp-control_*_all.deb
          if-no-files-found: error

  deb-install:
    needs: deb
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu2204
            container: ubuntu:22.04
          - target: ubuntu2404
            container: ubuntu:24.04
          - target: ubuntu2604
            container: ubuntu:26.04
          - target: debian12
            container: debian:12
          - target: debian13
            container: debian:13
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: package
      - name: Install and smoke-test DEB
        run: |
          apt-get update
          apt-get install -y ./package/warp-control_*_all.deb
          /usr/bin/warp-control --smoke-test

  arch:
    needs: source
    runs-on: ubuntu-24.04
    container: archlinux:latest
    env:
      VERSION: ${{ needs.source.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: source-tarball
          path: dist
      - name: Install Arch build requirements
        run: |
          pacman -Syu --noconfirm --needed base-devel python python-build \
            python-installer python-setuptools python-wheel python-pytest \
            python-yaml python-gobject gtk3 libayatana-appindicator python-idna namcap
          useradd --create-home builder
      - name: Stage temporary PKGBUILD with shared source
        run: |
          build_dir=$(mktemp -d "$GITHUB_WORKSPACE/build-arch.XXXXXX")
          cp packaging/arch/PKGBUILD "$build_dir/PKGBUILD"
          cp "dist/warp-control-$VERSION.tar.gz" "$build_dir/warp-control-$VERSION.tar.gz"
          source_sha256=$(sha256sum "$build_dir/warp-control-$VERSION.tar.gz" | cut -d ' ' -f 1)
          sed -i \
            's|^source=.*|source=("$pkgname-$pkgver.tar.gz")|' \
            "$build_dir/PKGBUILD"
          sed -i \
            "s|^sha256sums=.*|sha256sums=('$source_sha256')|" \
            "$build_dir/PKGBUILD"
          chown -R builder:builder "$build_dir"
          echo "BUILD_DIR=$build_dir" >> "$GITHUB_ENV"
      - name: Build and inspect Arch package
        run: |
          su builder -c "cd '$BUILD_DIR' && makepkg --noconfirm"
          namcap "$BUILD_DIR"/warp-control-*.pkg.tar.*
      - uses: actions/upload-artifact@v4
        with:
          name: arch
          path: build-arch.*/warp-control-*.pkg.tar.*
          if-no-files-found: error

  arch-install:
    needs: arch
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    container: archlinux:latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: arch
          path: package
      - name: Install and smoke-test Arch package
        run: |
          pacman -Syu --noconfirm
          pacman -U --noconfirm package/warp-control-*.pkg.tar.*
          /usr/bin/warp-control --smoke-test
