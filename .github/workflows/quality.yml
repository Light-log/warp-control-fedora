name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK runtime and checks
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-gi gir1.2-gtk-3.0 \
            gir1.2-ayatanaappindicator3-0.1 desktop-file-utils appstream
          python3 -m venv --system-site-packages .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e . pytest pyyaml ruff build idna
      - name: Lint
        run: .venv/bin/python -m ruff check .
      - name: Test
        run: .venv/bin/python -m pytest -q
      - name: Exercise the display-free startup path
        run: xvfb-run -a .venv/bin/python -m warp_control --smoke-test
      - name: Validate desktop metadata
        run: |
          desktop-file-validate data/com.devruby.warpcontrol.desktop
          appstreamcli validate --no-net data/com.devruby.warpcontrol.metainfo.xml
      - name: Build wheel
        run: .venv/bin/python -m build --wheel
